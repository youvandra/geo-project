{{define "content"}}
<script>
function fillSchemaExample() {
  document.querySelector('[name="type"]').value = 'Article';
  document.querySelector('[name="fields"]').value = 'headline=Belajar GEO dari A-Z author=kucnigplaygame';
}
</script>

<h2 class="text-2xl font-bold mb-4">JSON-LD Schema Builder</h2>
<p class="text-gray-500 mb-6">Generate structured data markup for GEO optimization.</p>

<form hx-post="/schema" hx-target="#result" hx-indicator="#loading" class="mb-6 space-y-3">
  <div>
    <label class="block text-sm font-medium mb-1">Schema Type</label>
    <select name="type" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      <option value="Article">Article</option>
      <option value="FAQPage">FAQPage</option>
      <option value="HowTo">HowTo</option>
      <option value="Product">Product</option>
      <option value="Person">Person</option>
      <option value="Organization">Organization</option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Fields (key=value pairs)</label>
    <textarea name="fields" rows="4" placeholder='headline="My Article" author="John Doe"'
      class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 font-mono text-sm"></textarea>
  </div>
  <div class="flex gap-2">
    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Build Schema</button>
    <button type="button" onclick="fillSchemaExample()" class="px-3 py-2 text-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">Try Example</button>
  </div>
</form>

<div id="loading" class="hidden text-blue-600 mb-4">Building...</div>
<div id="result">
  {{if .Error}}
    <div class="bg-red-50 text-red-600 p-4 rounded-lg mb-4">{{.Error}}</div>
  {{end}}
  {{if .Result}}
    {{template "schema-result" .}}
  {{end}}
</div>
{{end}}

{{define "schema-result"}}
<div class="bg-white p-6 rounded-lg shadow">
  <h3 class="font-medium mb-3">Generated JSON-LD</h3>
  <pre class="bg-gray-900 text-green-400 p-4 rounded-lg overflow-x-auto text-sm">{{.ResultJSON}}</pre>
  <button onclick="navigator.clipboard.writeText(`{{.ResultJSON}}`)" class="mt-2 px-3 py-1 text-xs bg-gray-200 rounded hover:bg-gray-300">Copy</button>
</div>
{{end}}
